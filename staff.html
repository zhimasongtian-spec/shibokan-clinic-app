<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かん活 スタッフ用</title>
<style>
  :root {
    --bg: #f4f7f5; --card: #ffffff; --ink: #24312a; --sub: #566158;
    --accent: #2e8b6d; --accent-soft: #e3f2ec; --accent-dark: #1f6b52;
    --danger: #c0504d; --danger-soft: #faeceb; --line: #e2e9e5;
    --radius: 14px; --shadow: 0 2px 10px rgba(36, 49, 42, .07);
  }
  html { font-size: 118%; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.65;
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .box { max-width: 420px; width: 100%; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px 22px; text-align: center; }
  .logo { font-size: 2.6rem; margin-bottom: 4px; }
  .box h2 { font-size: 1.2rem; color: var(--accent-dark); margin-bottom: 8px; }
  .box label { display: block; text-align: left; font-size: .84rem; font-weight: 600; margin: 11px 0 4px; }
  .box input {
    width: 100%; padding: 11px 12px; border: 1px solid var(--line); border-radius: 10px;
    font-size: 1.05rem; font-family: inherit; background: #fbfdfc; color: var(--ink);
  }
  .box input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .muted { color: var(--sub); font-size: .84rem; }
  .btn {
    display: block; width: 100%; padding: 14px; margin-top: 14px;
    background: var(--accent); color: #fff; border: none; border-radius: 12px;
    font-size: 1.05rem; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .btn:active { background: var(--accent-dark); }
  .btn.secondary { background: none; border: 1.5px solid var(--accent); color: var(--accent-dark); }
  .btn-link {
    background: none; border: none; color: var(--accent-dark); font-size: .84rem; font-weight: 700;
    cursor: pointer; font-family: inherit; padding: 6px 2px; margin-top: 12px;
  }
  .error { color: var(--danger); font-size: .84rem; margin-top: 8px; display: none; }
  .hidden { display: none !important; }
  .tabs { display: flex; gap: 8px; margin-bottom: 6px; }
  .tab-btn {
    flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid var(--line);
    background: #fbfdfc; color: var(--sub); font-weight: 700; font-size: .9rem; cursor: pointer; font-family: inherit;
  }
  .tab-btn.active { border-color: var(--accent); color: var(--accent-dark); background: var(--accent-soft); }
  .qr-wrap { margin-top: 16px; padding: 16px; background: var(--accent-soft); border-radius: 12px; }
  .qr-wrap canvas { margin: 0 auto; display: block; }
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(36,49,42,.4); display: flex;
    align-items: center; justify-content: center; padding: 20px; z-index: 10;
  }
</style>
</head>
<body>

<div class="box hidden" id="login-view">
  <div class="logo">🩺</div>
  <h2>医師・スタッフログイン</h2>
  <label for="staff-email">メールアドレス</label>
  <input type="email" id="staff-email" autocomplete="username">
  <label for="staff-pass">パスワード</label>
  <input type="password" id="staff-pass" autocomplete="current-password">
  <button class="btn" id="staff-login">ログイン</button>
  <p class="error" id="login-error"></p>
  <p class="muted" id="status"></p>
</div>

<div class="box hidden" id="panel-view">
  <div class="logo">🌿</div>
  <h2>患者の連携</h2>

  <div class="tabs">
    <button type="button" class="tab-btn active" id="tab-register">新規患者登録</button>
    <button type="button" class="tab-btn" id="tab-relink">既存患者の再連携</button>
  </div>

  <div id="form-register">
    <p class="muted">カルテIDを入力し、その場でQRコードを患者さんにスキャンしてもらってください。</p>
    <div id="reg-fields">
      <label for="reg-chart-id">カルテID</label>
      <input type="text" id="reg-chart-id" placeholder="カルテ番号・診察券番号など">
      <button class="btn" id="reg-submit">研究用IDを発行してQR表示</button>
    </div>
  </div>

  <div id="form-relink" class="hidden">
    <p class="muted">機種変更・PIN紛失などで患者さんが再連携する場合。既存の研究用IDに再接続します。</p>
    <div id="relink-fields">
      <label for="relink-chart-id">カルテID</label>
      <input type="text" id="relink-chart-id" placeholder="カルテ番号・診察券番号など">
      <button class="btn" id="relink-submit">再連携QRを発行</button>
    </div>
  </div>

  <p class="error" id="reg-error"></p>

  <div class="qr-wrap hidden" id="qr-result">
    <p class="muted" style="margin-bottom:10px;">患者さんのアプリでこのQRコードをスキャンしてもらってください（10分間有効）</p>
    <img id="qr-canvas" alt="QRコード" style="max-width:100%;">
  </div>

  <button type="button" class="btn secondary" id="logout-btn" style="margin-top:20px;">ログアウト</button>
</div>

<div class="modal-backdrop hidden" id="stepup-modal">
  <div class="box" style="text-align:left;">
    <h2 style="text-align:center;">🔒 本人確認</h2>
    <p class="muted" style="text-align:center;" id="stepup-current-user"></p>
    <label for="stepup-email" id="stepup-email-label" class="hidden">メールアドレス</label>
    <input type="email" id="stepup-email" autocomplete="username" class="hidden">
    <label for="stepup-pass">パスワード</label>
    <input type="password" id="stepup-pass" autocomplete="current-password">
    <button class="btn" id="stepup-submit">ログインして続行</button>
    <button class="btn-link" id="stepup-switch-user" style="display:block; margin: 8px auto 0;">別のスタッフとしてログイン</button>
    <button class="btn-link" id="stepup-cancel" style="display:block; margin: 4px auto 0;">キャンセル</button>
    <p class="error" id="stepup-error"></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script>
"use strict";
firebase.initializeApp({
  apiKey: "AIzaSyBaxpb3ZTabQ1PojPN5UC2_XYU32-nBBas",
  authDomain: "kancare-8a0d1.firebaseapp.com",
  projectId: "kancare-8a0d1",
  storageBucket: "kancare-8a0d1.firebasestorage.app",
  messagingSenderId: "884218065527",
  appId: "1:884218065527:web:cd036aa8269ecb7fac8c72",
});
const auth = firebase.auth();
// 医師は日常的に開くたびメール再入力させたくないので、端末に永続化する。
// 患者登録・再連携の直前は必ずパスワード確認を求め、操作した本人を記録する。
// 同じ端末を別のスタッフが使う場合は、その場でメール＋パスワードに切り替えて
// ログインし直せる（stepup-modal参照）。
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

const FN_BASE = "https://asia-northeast1-kancare-8a0d1.cloudfunctions.net";
const STAFF_REGISTER_URL = `${FN_BASE}/staffRegisterPatient`;
const STAFF_RELINK_URL = `${FN_BASE}/staffRelinkPatient`;
// この病院専用アプリのため病院IDは固定値。対応表のスキーマ自体は
// hospitalId/hospitalPatientNoのままなので、Cloud Functions側の変更は不要。
const HOSPITAL_ID = "kagawa-univ-hospital";

function setStatus(msg) { document.getElementById("status").textContent = msg || ""; }
async function authedFetch(url, body) {
  const idToken = await auth.currentUser.getIdToken();
  const res = await fetch(url, {
    method: "POST",
    headers: { "content-type": "application/json", "authorization": "Bearer " + idToken },
    body: JSON.stringify(body || {}),
  });
  const data = await res.json().catch(() => ({}));
  return { ok: res.ok, status: res.status, data };
}

document.getElementById("staff-login").addEventListener("click", async () => {
  const errEl = document.getElementById("login-error");
  errEl.style.display = "none";
  const email = document.getElementById("staff-email").value.trim();
  const pass = document.getElementById("staff-pass").value;
  if (!email || !pass) return;
  setStatus("ログイン中...");
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch (err) {
    setStatus("");
    errEl.textContent = "メールアドレスまたはパスワードが正しくありません";
    errEl.style.display = "block";
  }
});

// タブ切り替え
document.getElementById("tab-register").addEventListener("click", () => switchTab("register"));
document.getElementById("tab-relink").addEventListener("click", () => switchTab("relink"));
function switchTab(which) {
  document.getElementById("tab-register").classList.toggle("active", which === "register");
  document.getElementById("tab-relink").classList.toggle("active", which === "relink");
  document.getElementById("form-register").classList.toggle("hidden", which !== "register");
  document.getElementById("form-relink").classList.toggle("hidden", which !== "relink");
  document.getElementById("qr-result").classList.add("hidden");
  document.getElementById("reg-error").style.display = "none";
  // QR発行後に隠した入力欄を、タブを選び直したタイミングで再表示する
  document.getElementById("reg-fields").classList.remove("hidden");
  document.getElementById("relink-fields").classList.remove("hidden");
}

// ------- ステップアップ認証 -------
// 共有端末で複数人が使う可能性があるため、患者登録・再連携の直前は必ず
// 本人確認を求める。通常は今ログイン中の人がパスワードだけ入力すればよいが、
// 「別のスタッフとしてログイン」を選べば、今のセッションに関係なく
// メール＋パスワードで改めてログインし直せる。
function ensureStepUp() {
  return new Promise((resolve) => showReloginModal(resolve));
}

function showReloginModal(resolve) {
  const modal = document.getElementById("stepup-modal");
  const errEl = document.getElementById("stepup-error");
  const currentUserEl = document.getElementById("stepup-current-user");
  const emailLabel = document.getElementById("stepup-email-label");
  const emailInput = document.getElementById("stepup-email");
  const passInput = document.getElementById("stepup-pass");
  const submitBtn = document.getElementById("stepup-submit");
  const cancelBtn = document.getElementById("stepup-cancel");
  const switchBtn = document.getElementById("stepup-switch-user");
  errEl.style.display = "none";
  emailInput.value = "";
  passInput.value = "";
  let switchMode = false;
  setSwitchMode(false);
  modal.classList.remove("hidden");

  function setSwitchMode(on) {
    switchMode = on;
    emailLabel.classList.toggle("hidden", !on);
    emailInput.classList.toggle("hidden", !on);
    currentUserEl.textContent = on
      ? "別のスタッフとしてログインします。メールアドレスとパスワードを入力してください。"
      : `${auth.currentUser.email} としてパスワードを入力してください。`;
    switchBtn.style.display = on ? "none" : "block";
  }

  const cleanup = () => {
    modal.classList.add("hidden");
    submitBtn.removeEventListener("click", onSubmit);
    cancelBtn.removeEventListener("click", onCancel);
    switchBtn.removeEventListener("click", onSwitch);
  };
  const onCancel = () => { cleanup(); resolve(false); };
  const onSwitch = () => { errEl.style.display = "none"; setSwitchMode(true); };
  const onSubmit = async () => {
    const pass = passInput.value;
    if (!pass) return;
    if (switchMode && !emailInput.value.trim()) return;
    try {
      if (switchMode) {
        await auth.signOut();
        await auth.signInWithEmailAndPassword(emailInput.value.trim(), pass);
      } else {
        const cred = firebase.auth.EmailAuthProvider.credential(auth.currentUser.email, pass);
        await auth.currentUser.reauthenticateWithCredential(cred);
      }
      const tokenResult = await auth.currentUser.getIdTokenResult(true);
      if (tokenResult.claims.role !== "staff") {
        await auth.signOut();
        throw new Error("not staff");
      }
      cleanup();
      resolve(true);
    } catch {
      errEl.textContent = "メールアドレスまたはパスワードが正しくありません";
      errEl.style.display = "block";
    }
  };
  submitBtn.addEventListener("click", onSubmit);
  cancelBtn.addEventListener("click", onCancel);
  switchBtn.addEventListener("click", onSwitch);
}

function showQr(token, fieldsIdToHide) {
  const wrap = document.getElementById("qr-result");
  wrap.classList.remove("hidden");
  const qr = qrcode(0, "M");
  qr.addData(token);
  qr.make();
  document.getElementById("qr-canvas").src = qr.createDataURL(6, 8);
  // QR発行後は入力欄・ボタンを隠す。次の患者を登録する時はタブを選び直せば戻る。
  document.getElementById(fieldsIdToHide).classList.add("hidden");
}

document.getElementById("reg-submit").addEventListener("click", async () => {
  const errEl = document.getElementById("reg-error");
  errEl.style.display = "none";
  document.getElementById("qr-result").classList.add("hidden");
  const chartId = document.getElementById("reg-chart-id").value.trim();
  if (!chartId) { errEl.textContent = "カルテIDを入力してください"; errEl.style.display = "block"; return; }

  const stepped = await ensureStepUp();
  if (!stepped) return;

  const { ok, data } = await authedFetch(STAFF_REGISTER_URL, { hospitalId: HOSPITAL_ID, hospitalPatientNo: chartId });
  if (!ok) {
    errEl.textContent = "登録に失敗しました: " + ((data.error && data.error.message) || "");
    errEl.style.display = "block";
    return;
  }
  showQr(data.token, "reg-fields");
  document.getElementById("reg-chart-id").value = "";
});

document.getElementById("relink-submit").addEventListener("click", async () => {
  const errEl = document.getElementById("reg-error");
  errEl.style.display = "none";
  document.getElementById("qr-result").classList.add("hidden");
  const chartId = document.getElementById("relink-chart-id").value.trim();
  if (!chartId) { errEl.textContent = "カルテIDを入力してください"; errEl.style.display = "block"; return; }

  const stepped = await ensureStepUp();
  if (!stepped) return;

  const { ok, data } = await authedFetch(STAFF_RELINK_URL, { hospitalId: HOSPITAL_ID, hospitalPatientNo: chartId });
  if (!ok) {
    errEl.textContent = "再連携に失敗しました: " + ((data.error && data.error.message) || "");
    errEl.style.display = "block";
    return;
  }
  showQr(data.token, "relink-fields");
});

document.getElementById("logout-btn").addEventListener("click", () => auth.signOut());

auth.onAuthStateChanged(async user => {
  const loginView = document.getElementById("login-view");
  const panelView = document.getElementById("panel-view");
  if (!user) {
    loginView.classList.remove("hidden");
    panelView.classList.add("hidden");
    return;
  }
  setStatus("確認中...");
  const tokenResult = await user.getIdTokenResult(true);
  if (tokenResult.claims.role === "staff") {
    setStatus("");
    loginView.classList.add("hidden");
    panelView.classList.remove("hidden");
  } else {
    setStatus("このアカウントはスタッフとして登録されていません。");
    await auth.signOut();
  }
});
</script>
</body>
</html>
